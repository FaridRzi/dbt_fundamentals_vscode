models:
  - name: stg_jaffle_shop__customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: status
        data_tests:
          - test_name: accepted_values
            arguments:
              values: ['shipped', 'completed', 'return_pending', 'placed', 'returned']
      - name: customer_id
        data_tests:
          - test_name: relationships
            arguments:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id